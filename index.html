<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Simple</title>
</head>
<body>
    <header class="container">
        <img src="assets/simplelogo.svg" alt="Simple logo" class="header-logo">
        <div class="header-right">
            <div class="header-links">
                <a href="/">Продукция</a>
                <a href="/">Материалы</a>            
                <a href="/">О нас</a>            
                <a href="/">Контакты</a>
            </div>
            <div class="header-buttons">
                <button class="header-button">
                    <span>
                        <img src="assets/Search.svg" alt="search">
                    </span>
                </button>
                <button class="header-button">
                    <span>
                        <img src="assets/log_in.svg" alt="Log in">
                    </span>
                </button>                
            </div>
        </div>  
    </header>

    <main>
        <section class="bumaga">
            <div class="bumaga-left">
                <h1>Простые вещи. Из бумаги</h1>
                <p class="bumaga-left-text">Бума́га (предположительно от итал. bombagia, первоисточником же считается иранский) — волокнистый материал с минеральными добавками. </p>
                <a href="/">Каталог</a>
            </div>

        </section>
    </main>
</body>
</html>
